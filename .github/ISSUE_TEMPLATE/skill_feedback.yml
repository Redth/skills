name: Skill feedback
description: Report friction with a skill from this marketplace (ideally generated by skill-reflect).
title: "[feedback] <skill-name>: <one-line summary>"
labels: ["skill-feedback"]
body:
  - type: markdown
    attributes:
      value: |
        The best feedback is generated by **`skill-reflect`** itself — it scrubs
        PII/secrets and proposes a concrete fix plus a verifiable eval. If you
        have a scrubbed report, paste it below.

        ⚠️ **Do not paste raw transcripts, secrets, tokens, absolute paths, or
        personal data.** Paraphrase. Reports produced by `skill-reflect` are
        already scrubbed.
  - type: input
    id: skill
    attributes:
      label: Which skill?
      placeholder: e.g. skill-reflect
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Friction category
      options:
        - Missing case
        - Wrong or stale guidance
        - Missing detail
        - Missing or failing script/asset
        - Unclear routing
        - Trigger problem (didn't fire / fired wrongly)
        - Other
    validations:
      required: true
  - type: textarea
    id: report
    attributes:
      label: Scrubbed report
      description: Paste the `skill-reflect` Markdown report, or describe the friction in your own words (paraphrased, no PII).
      render: markdown
    validations:
      required: true
  - type: textarea
    id: proposed-eval
    attributes:
      label: Proposed eval (optional)
      description: A prompt + must_contain / must_not_contain, or an evals.json snippet, that would catch this.
      render: json
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: This report contains no PII, secrets, absolute paths, or verbatim transcript excerpts.
          required: true
