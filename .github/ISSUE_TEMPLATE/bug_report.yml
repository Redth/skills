name: Bug report
description: A script, hook, manifest, or skill behaves incorrectly.
title: "[bug] <one-line summary>"
labels: ["bug"]
body:
  - type: input
    id: component
    attributes:
      label: Component
      placeholder: e.g. hooks/stage_pending.py, tools/validate_marketplace.py, skills/skill-reflect
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Agent / host
      options:
        - Claude Code
        - Copilot CLI
        - Gemini CLI
        - opencode
        - Amp
        - Other / N/A
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include commands. Redact any paths/PII.
      render: shell
  - type: input
    id: versions
    attributes:
      label: Environment
      placeholder: OS, Python version, agent version
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed any PII, secrets, and absolute paths from this report.
          required: true
